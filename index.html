<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offshore Scale</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>Offshore Scale</h1>
      <p class="subtitle">Calcule sua escala de trabalho offshore</p>
    </header>

    <section class="form-section">
      <div class="field custom-fields" id="custom-fields">
        <div>
          <label for="dias-embarque">Dias embarcado</label>
          <input type="number" id="dias-embarque" min="1" max="365" placeholder="Ex: 14" />
        </div>
        <div>
          <label for="dias-desembarque">Dias desembarcado</label>
          <input type="number" id="dias-desembarque" min="1" max="365" placeholder="Ex: 21" />
        </div>
      </div>

      <div class="field">
        <label>Data do primeiro embarque</label>
        <div class="cal-wrapper">
          <input type="text" id="data-inicio-display" class="cal-input" placeholder="Selecione uma data" readonly />
          <input type="hidden" id="data-inicio" />
          <div class="cal-dropdown hidden" id="cal-dropdown">
            <div class="cal-header">
              <button type="button" id="cal-prev">&#8249;</button>
              <span id="cal-titulo"></span>
              <button type="button" id="cal-next">&#8250;</button>
            </div>
            <div class="cal-dias-semana">
              <span>Dom</span><span>Seg</span><span>Ter</span>
              <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
          </div>
        </div>
      </div>

      <button id="btn-calcular" onclick="calcular()">Calcular</button>
    </section>

    <section class="resultado hidden" id="resultado">
      <div class="status-card" id="status-card">
        <span class="status-label">Status hoje</span>
        <span class="status-value" id="status-hoje"></span>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <span class="info-label">Próximo embarque</span>
          <span class="info-date" id="proximo-embarque"></span>
          <span class="info-dias" id="dias-para-embarque"></span>
        </div>
        <div class="info-card">
          <span class="info-label">Próximo desembarque</span>
          <span class="info-date" id="proximo-desembarque"></span>
          <span class="info-dias" id="dias-para-desembarque"></span>
        </div>
      </div>

      <div class="ver-calendario">
        <span class="ver-label">Ver calendário</span>
        <div class="btn-grupo">
          <button onclick="irParaCalendario('mensal')">Mensal</button>
          <button onclick="irParaCalendario('semestral')">Semestral</button>
          <button onclick="irParaCalendario('anual')">Anual</button>
        </div>
      </div>
    </section>
  </div>

  <script src="calculos.js"></script>
  <script src="app.js"></script>
</body>
</html>
