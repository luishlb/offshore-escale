<!DOCTYPE html>
<html>
<body style="background:#1e293b;color:#e2e8f0;font-family:sans-serif;padding:32px">
  <h2>Gerador de ícones — Offshore Scale</h2>
  <p>Clique nos botões para baixar os ícones PNG e coloque-os na pasta do projeto.</p>
  <br>
  <button onclick="baixar(192)">⬇ Baixar icon-192.png</button>
  <button onclick="baixar(512)">⬇ Baixar icon-512.png</button>

  <canvas id="c" style="display:none"></canvas>

  <script>
    function desenhar(size) {
      const canvas = document.getElementById('c');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const r = size * 0.18;

      // Fundo arredondado
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#0f172a';
      ctx.fill();

      // "OS"
      ctx.fillStyle = '#38bdf8';
      ctx.font = `bold ${size * 0.42}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('OS', size / 2, size * 0.42);

      // "OFFSHORE"
      ctx.fillStyle = '#94a3b8';
      ctx.font = `600 ${size * 0.13}px Arial`;
      ctx.fillText('OFFSHORE', size / 2, size * 0.72);
    }

    function baixar(size) {
      desenhar(size);
      const canvas = document.getElementById('c');
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
